name: Performance & Correctness Benchmark

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: Run Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout base code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.base_ref || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before) || 'master' }}
          path: base-repo
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run benchmark on base branch
        run: |
          PYTHONPATH=base-repo/src python .github/workflows/scripts/run_perf_check.py --output base_results.json

      - name: Run benchmark on PR branch
        run: |
          PYTHONPATH=src python .github/workflows/scripts/run_perf_check.py --output pr_results.json

      - name: Compare results
        run: |
          python .github/workflows/scripts/compare_perf.py pr_results.json base_results.json

      - name: Check Malpedia Password Availability
        id: check_password
        run: |
          if [ -n "$MALPEDIA_ZIP_PASSWORD" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          MALPEDIA_ZIP_PASSWORD: ${{ secrets.MALPEDIA_ZIP_PASSWORD }}

      - name: Decrypt Malpedia Samples
        if: steps.check_password.outputs.available == 'true'
        run: |
          unzip -q -P "$MALPEDIA_ZIP_PASSWORD" .github/workflows/data/malpedia.zip -d malpedia_extracted
        env:
          MALPEDIA_ZIP_PASSWORD: ${{ secrets.MALPEDIA_ZIP_PASSWORD }}

      - name: Run Malpedia Benchmark - Base Branch
        if: steps.check_password.outputs.available == 'true'
        run: |
          PYTHONPATH=base-repo/src python .github/workflows/scripts/process_malpedia.py malpedia_extracted/malpedia runtime_measurements/base_0
          PYTHONPATH=base-repo/src python .github/workflows/scripts/process_malpedia.py malpedia_extracted/malpedia runtime_measurements/base_1
          PYTHONPATH=base-repo/src python .github/workflows/scripts/process_malpedia.py malpedia_extracted/malpedia runtime_measurements/base_2

      - name: Run Malpedia Benchmark - PR Branch
        if: steps.check_password.outputs.available == 'true'
        run: |
          PYTHONPATH=src python .github/workflows/scripts/process_malpedia.py malpedia_extracted/malpedia runtime_measurements/pr_0
          PYTHONPATH=src python .github/workflows/scripts/process_malpedia.py malpedia_extracted/malpedia runtime_measurements/pr_1
          PYTHONPATH=src python .github/workflows/scripts/process_malpedia.py malpedia_extracted/malpedia runtime_measurements/pr_2

      - name: Evaluate Malpedia Runtime
        if: steps.check_password.outputs.available == 'true'
        run: |
          python .github/workflows/scripts/evaluate_runtime.py

      - name: Publish Malpedia Results to Step Summary
        if: steps.check_password.outputs.available == 'true'
        run: |
          cat runtime_measurements/cache/evaluation.md >> $GITHUB_STEP_SUMMARY

      - name: Post PR Comment with Malpedia Results
        if: steps.check_password.outputs.available == 'true' && github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file runtime_measurements/cache/evaluation.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Malpedia Evaluation Artifacts
        if: steps.check_password.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: malpedia-evaluation-report
          path: |
            runtime_measurements/cache/evaluation.html
            runtime_measurements/cache/evaluation.json
            runtime_measurements/cache/evaluation.md
